spring:
  profiles:
    # NOTE: Security: Caution: For now hosting only as an internal docker service used by a separate app in the same docker env.
    # The app currently exposes the transcribe operation, though that does let you specify a known path.
    # so in theory there is some risk of extracting transcripts from videos on disk if this were opened up.
    # not an issue for now but we'll probably want to add some server to server auth solution when we push this into eks.
    active: internal-only
  application:
    name: whisper-wrapper
  datasource:
    # for this app we only need the non reactive for liquibase.
    url: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_URL:jdbc:postgresql://localhost:5432/video_notes}
    username: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_USERNAME:user}
    password: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: ${SPRING_R2DBC_DATASOURCE_URL:r2dbc:postgresql://localhost:5432/video_notes}
    username: ${SPRING_R2DBC_DATASOURCE_USERNAME:user}
    password: ${SPRING_R2DBC_DATASOURCE_PASSWORD:password}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:1GB}
      max-request-size: ${MAX_REQUEST_SIZE:1025MB}

logging:
  level:
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

app:
  media-input: ${MEDIA_INPUT:./media-input} # TODO use an env var with a fallback to the process working dir / media
  transcript-output: ${TRANSCRIPT_OUTPUT:./transcript-output} # TODO use an env var with a fallback to the process working dir / media
  video-output: ${VIDEO_OUTPUT:./video-output}

  # WhisperX configuration - app level settings that are not user configurable
  whisperx:
    # Default model to use if not specified by user
    default-model: ${WHISPERX_DEFAULT_MODEL:large-v2}
    # Default batch size for inference
    # TODO: make sure we have enough ram for this.
    batch-size: ${WHISPERX_BATCH_SIZE:8}
    # Default compute type for computation
    compute-type: ${WHISPERX_COMPUTE_TYPE:default} # TODO explore other options.
    # Default alignment model (auto-selected if null)
    default-align-model: ${WHISPERX_DEFAULT_ALIGN_MODEL:}
    # Default VAD method
    default-vad-method: ${WHISPERX_DEFAULT_VAD_METHOD:pyannote}
    # Default output format
    #
    # TODO we are hard coding an assumption that this is srt, or 'all' which will include srt
    #
    # We need to make it configurable. IF we do then we could let the end user specify this
    #
    # For now no...
    #
    default-output-format: ${WHISPERX_DEFAULT_OUTPUT_FORMAT:all}
    # Device to use for inference
    # TODO if we can get a GPU dedicated to this component or more vram we can do cuda, but for now we are using cuda for the llm component.
    device: ${WHISPERX_DEVICE:cpu}
    # Device index for FasterWhisper inference
    device-index: ${WHISPERX_DEVICE_INDEX:0}
    # Whether to print progress during transcription
    print-progress: ${WHISPERX_PRINT_PROGRESS:false}
    # HuggingFace token for accessing gated models (diarization)   // TODO Not sure we want to allow the user to pass this in.
    #            // IF we do we need to ensure it doesn't get stored, or if it's stored it's like GDPR deletable and
    #            // Encrypted..etc  um for now.
    # hf-token: ${WHISPERX_HF_TOKEN:}