version: '3.8'

services:

  postgres-w-vector:
    image: pgvector/pgvector:pg18-trixie # postgres PLUS vector db :)
    healthcheck: # Pg vector does some restart cycling for some reason. So, we need to ensure it's ready.
      # https://www.postgresql.org/docs/current/app-pg-isready.html
      test: [ "CMD-SHELL", "pg_isready -d \"video_notes\" -U \"user\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: video_notes
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql

  spring-boot-app:
    build: .
    ports:
      - "8070:8080"
    depends_on:
      postgres-w-vector:
        condition: service_healthy
    environment:
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_URL: jdbc:postgresql://postgres-w-vector:5432/video_notes
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_USERNAME: user
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_PASSWORD: password
      # currently the same datasource with different protocol, but it's important to note that
      #  A) this doesn't have to be true
      # and B) we don't want to use the non r2dbc datasource with the r2dbc datasource for standard pg queries.
      #  The non r2dbc datasource is for vector db enly.
      SPRING_R2DBC_DATASOURCE_URL: r2dbc:postgresql://postgres-w-vector:5432/video_notes
      SPRING_R2DBC_DATASOURCE_USERNAME: user
      SPRING_R2DBC_DATASOURCE_PASSWORD: password
      MEDIA_INPUT: /media-input
      TRANSCRIPT_OUTPUT: /transcript-output
      VIDEO_OUTPUT: /video-output
    volumes:
      - ./models:/root/.cache
      - ./media-input:/media-input
      - ./transcript-output:/transcript-output
      - ./video-output:/video-output

