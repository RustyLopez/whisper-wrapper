version: '3.8'

services:

  postgres-w-vector:
    image: pgvector/pgvector:pg18-trixie # postgres PLUS vector db :)
    healthcheck: # Pg vector does some restart cycling for some reason. So, we need to ensure it's ready.
      # https://www.postgresql.org/docs/current/app-pg-isready.html
      test: [ "CMD-SHELL", "pg_isready -d \"video_notes\" -U \"user\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_URL: jdbc:postgresql://postgres-w-vector:5432/video_notes
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_USERNAME: user
      SPRING_VECTOR_DB_POSTGRES_DATASOURCE_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql

  spring-boot-app:
    build: .
    ports:
      - "8070:8080"
    depends_on:
      postgres-w-vector:
        condition: service_healthy
    environment:
      MEDIA_INPUT: /media-input
      TRANSCRIPT_OUTPUT: /transcript-output
#      SPRING_DATASOURCE_USERNAME: user
#      SPRING_DATASOURCE_PASSWORD: password
    volumes:
      - ./media-input:/media-input
      - ./transcript-output:/transcript-output

